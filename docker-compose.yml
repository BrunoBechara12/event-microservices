version: '3.4'

services:
  events.database:
    image: postgres:15-alpine
    container_name: events.database
    environment:
      - POSTGRES_DB=events
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
       - ./.containers/events-db:/var/lib/postgresql/data
    ports:
       - "5432:5432"

  events.api:
    image: ${DOCKER_REGISTRY-}eventsapi
    container_name: events.api
    build:
      context: ./
      dockerfile: Services/EventService/src/Adapters.Primary.API/Dockerfile
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      - events.database
      - rabbitmq

  guests.database:
    image: postgres:15-alpine
    container_name: guests.database
    environment:
      - POSTGRES_DB=guests
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
       - ./.containers/guests-db:/var/lib/postgresql/data
    ports:
       - "5433:5432"

  guests.api:
    image: ${DOCKER_REGISTRY-}guestsapi
    container_name: guests.api
    build:
      context: ./
      dockerfile: Services/GuestService/src/Adapters.Primary.API/Dockerfile
    ports:
      - "5002:5000"
      - "5003:5001"
    depends_on:
      - guests.database

  notifications.database:
    image: postgres:15-alpine
    container_name: notifications.database
    environment:
      - POSTGRES_DB=notifications
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
       - ./.containers/notifications-db:/var/lib/postgresql/data
    ports:
       - "5434:5432"

  notifications.api:
    image: ${DOCKER_REGISTRY-}notificationsapi
    container_name: notifications.api
    build:
      context: ./
      dockerfile: Services/NotificationService/src/Adapters.Primary.API/Dockerfile
    ports:
      - "5004:5000"
      - "5005:5001"
    environment:
      - ConnectionStrings__NotificationDb=Host=notifications.database;Port=5432;Database=notifications;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - EvolutionApi__BaseUrl=http://evolution-api:8080
      - EvolutionApi__ApiKey=${EVOLUTION_API_KEY:-your-api-key}
      - EvolutionApi__InstanceName=${EVOLUTION_INSTANCE:-default}
    depends_on:
      - notifications.database
      - rabbitmq

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    environment:
      - SERVER_URL=http://evolution-api:8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-your-api-key}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@evolution.database:5432/evolution
      - REDIS_ENABLED=false
    ports:
      - "8080:8080"
    depends_on:
      - evolution.database

  evolution.database:
    image: postgres:15-alpine
    container_name: evolution.database
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
       - ./.containers/evolution-db:/var/lib/postgresql/data
    ports:
       - "5435:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: event-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"


