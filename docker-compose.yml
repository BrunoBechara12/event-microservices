version: '3.4'

services:
  events.database:
    image: postgres:15-alpine
    container_name: events.database
    environment:
      - POSTGRES_DB=events
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
       - ./.containers/events-db:/var/lib/postgresql/data
    ports:
       - "5432:5432"

  events.api:
    image: ${DOCKER_REGISTRY-}eventsapi
    container_name: events.api
    build:
      context: ./
      dockerfile: Services/EventService/src/Adapters.Primary.API/Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - events.database
      - rabbitmq

  guests.database:
    image: postgres:15-alpine
    container_name: guests.database
    environment:
      - POSTGRES_DB=guests
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
       - ./.containers/guests-db:/var/lib/postgresql/data
    ports:
       - "5433:5432"

  guests.api:
    image: ${DOCKER_REGISTRY-}guestsapi
    container_name: guests.api
    build:
      context: ./
      dockerfile: Services/GuestService/src/Adapters.Primary.API/Dockerfile
    ports:
      - "5001:5000"
    depends_on:
      - guests.database
      - rabbitmq

  notifications.database:
    image: postgres:15-alpine
    container_name: notifications.database
    environment:
      - POSTGRES_DB=notifications
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
       - ./.containers/notifications-db:/var/lib/postgresql/data
    ports:
       - "5434:5432"

  notifications.api:
    image: ${DOCKER_REGISTRY-}notificationsapi
    container_name: notifications.api
    build:
      context: ./
      dockerfile: Services/NotificationService/src/Adapters.Primary.API/Dockerfile
    ports:
      - "5002:5000"
    environment:
      - EvolutionApi__ApiKey=${EVOLUTION_API_KEY}
      - EvolutionApi__InstanceName=${EVOLUTION_INSTANCE_NAME}
    depends_on:
      - notifications.database
      - rabbitmq

  evolution-api:
    container_name: evolution_api
    image: atendai/evolution-api:v2.2.2
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - evolution.database
      - evolution-redis
    environment:
      - SERVER_URL=http://localhost:8081
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1033062290
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@evolution.database:5432/evolution
      - DATABASE_CLIENT_NAME=evolution_exchange
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379/0
      - CACHE_REDIS_PREFIX="evolution:"
      - CACHE_REDIS_SAVE_INSTANCES=true
    volumes:
      - evolution_instances:/evolution/instances

  evolution.database:
    image: postgres:15-alpine
    container_name: evolution.database
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
       - ./.containers/evolution-db:/var/lib/postgresql/data
    ports:
       - "5435:5432"

  evolution-redis:
    image: redis:alpine
    container_name: evolution_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - evolution_redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: event-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"

  gateway.database:
    image: postgres:15-alpine
    container_name: gateway.database
    environment:
      - POSTGRES_DB=gateway
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
       - ./.containers/gateway-db:/var/lib/postgresql/data
    ports:
       - "5436:5432"

  gateway.api:
    image: ${DOCKER_REGISTRY-}gatewayapi
    container_name: gateway.api
    build:
      context: ./
      dockerfile: Services/ApiGateway/Dockerfile
    ports:
      - "5010:5010"
    depends_on:
      - gateway.database
      - events.api
      - guests.api
      - notifications.api

volumes:
  evolution_instances:
  evolution_redis_data:
